<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate ReadLater Icons</title>
  <style>
    body { font-family: sans-serif; padding: 40px; text-align: center; }
    button {
      margin: 10px;
      padding: 14px 28px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    p { color: #64748b; margin-bottom: 24px; }
  </style>
</head>
<body>
  <h2>📚 ReadLater Icon Generator</h2>
  <p>Click both buttons to download the icon files.<br>
     Then upload <strong>icon-192.png</strong> and <strong>icon-512.png</strong> to your GitHub repo.</p>
  <button onclick="generateIcon(192)">⬇ Download icon-192.png</button>
  <button onclick="generateIcon(512)">⬇ Download icon-512.png</button>

  <script>
    function generateIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Rounded rectangle background (purple gradient)
      const radius = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();

      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#6366f1');
      gradient.addColorStop(1, '#8b5cf6');
      ctx.fillStyle = gradient;
      ctx.fill();

      // "RL" text in white
      ctx.fillStyle = 'white';
      ctx.font = `bold ${Math.round(size * 0.38)}px -apple-system, Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('RL', size / 2, size / 2);

      // Trigger download
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
